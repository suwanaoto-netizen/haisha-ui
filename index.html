
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);}

/* ── ルート ── */
.root{display:flex;height:700px;background:var(--color-background-primary);border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary);position:relative;}

/* ── 左：AI結果パネル（主役） ── */
.ai-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:0.5px solid var(--color-border-tertiary);}

/* ステータスバー */
.status-bar{padding:18px 28px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:14px;}
.status-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;}
.sp-ok{background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97;}
.sp-warn{background:#FAEEDA;color:#633806;border:0.5px solid #FAC775;}
.sp-ng{background:#FCEBEB;color:#791F1F;border:0.5px solid #F7C1C1;}
.sp-dot{width:7px;height:7px;border-radius:50%;}
.sp-ok .sp-dot{background:#3B6D11;}
.sp-warn .sp-dot{background:#854F0B;}
.sp-ng .sp-dot{background:#A32D2D;}
.status-route{font-size:12px;color:var(--color-text-secondary);}
.status-route strong{color:var(--color-text-primary);font-weight:500;}
.chat-trigger{margin-left:auto;font-size:11px;color:#185FA5;cursor:pointer;display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid #B5D4F4;background:#E6F1FB;transition:background .12s;}
.chat-trigger:hover{background:#B5D4F4;}

/* メイン結果エリア */
.result-body{flex:1;overflow-y:auto;padding:32px 36px;}

/* 価格ブロック（超目立つ） */
.price-block{margin-bottom:36px;}
.pb-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase;}
.pb-price{font-size:56px;font-weight:500;color:var(--color-text-primary);line-height:1;letter-spacing:-1px;margin-bottom:8px;}
.pb-sub{font-size:13px;color:var(--color-text-secondary);}
.pb-reason{font-size:13px;color:var(--color-text-secondary);margin-top:12px;line-height:1.7;padding-top:12px;border-top:0.5px solid var(--color-border-tertiary);}

/* 提案ブロック（1枚に統合） */
.proposal-block{margin-bottom:28px;}
.pb2-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:12px;letter-spacing:.06em;}
.proposals{display:flex;flex-direction:column;gap:8px;}
.prop{padding:14px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px;}
.prop:hover{border-color:#185FA5;background:var(--color-background-secondary);}
.prop.selected{border-color:#185FA5;border-width:1.5px;}
.prop.rejected{opacity:.35;pointer-events:none;}
.prop-left{flex:1;}
.prop-type{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px;}
.prop-detail{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}
.prop-price{font-size:18px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;}
.prop-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;margin-bottom:6px;display:inline-block;}
.pt-rec{background:#E6F1FB;color:#185FA5;}
.pt-alt{color:var(--color-text-secondary);background:var(--color-background-secondary);}
.pt-min{color:#3B6D11;background:#EAF3DE;}

/* アクションボタン */
.action-block{display:flex;gap:10px;}
.btn-primary{flex:1;padding:13px;background:#185FA5;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;}
.btn-primary:hover{background:#0C447C;}
.btn-primary:disabled{background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:default;}
.btn-ghost{padding:13px 18px;background:none;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-ghost:hover{background:var(--color-background-secondary);}

/* 空状態 */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;}
.es-icon{font-size:40px;opacity:.2;}
.es-title{font-size:14px;font-weight:500;color:var(--color-text-secondary);}
.es-sub{font-size:12px;color:var(--color-text-secondary);opacity:.7;text-align:center;line-height:1.6;}

/* ローディング */
.loading-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;}
.ls-price{font-size:56px;font-weight:500;color:var(--color-border-tertiary);letter-spacing:-1px;animation:fade 1s ease-in-out infinite;}
@keyframes fade{0%,100%{opacity:.2}50%{opacity:.6}}
.ls-bar{width:200px;height:3px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;}
.ls-fill{height:100%;background:#185FA5;border-radius:2px;animation:prog 1.8s ease-in-out infinite;}
@keyframes prog{0%{width:0%;margin-left:0}60%{width:70%;margin-left:0}100%{width:0%;margin-left:100%}}
.ls-text{font-size:12px;color:var(--color-text-secondary);}

/* ── 右：入力パネル（脇役） ── */
.input-panel{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:var(--color-background-secondary);overflow:hidden;}
.ip-header{padding:18px 20px 14px;border-bottom:0.5px solid var(--color-border-tertiary);}
.ip-title{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.ip-sub{font-size:10px;color:var(--color-text-secondary);margin-top:2px;}
.ip-body{flex:1;overflow-y:auto;padding:16px 18px;}
.fr{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.fl{font-size:11px;color:var(--color-text-secondary);}
.fi,.fs{padding:7px 9px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%;}
.fi:focus,.fs:focus{outline:none;border-color:#185FA5;}
.detail-toggle{font-size:11px;color:#185FA5;cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;background:none;border:none;margin-bottom:14px;}
.detail-section{display:none;flex-direction:column;gap:0;}
.detail-section.open{display:flex;}
.ds-divider{height:0.5px;background:var(--color-border-tertiary);margin:0 0 14px;}
.ip-foot{padding:14px 18px;border-top:0.5px solid var(--color-border-tertiary);}
.run-btn{width:100%;padding:10px;background:#185FA5;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;}
.run-btn:hover{background:#0C447C;}
.run-btn.loading{background:var(--color-border-tertiary);cursor:default;animation:fade 1s infinite;}
.auto-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--color-text-secondary);margin-top:7px;justify-content:center;}
.auto-dot{width:5px;height:5px;border-radius:50%;background:#3B6D11;}

/* ── サイドチャットパネル（スライド） ── */
.chat-panel{position:absolute;top:0;right:0;bottom:0;width:320px;background:var(--color-background-primary);border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;z-index:10;box-shadow:-4px 0 16px rgba(0,0,0,.06);}
.chat-panel.open{transform:translateX(0);}
.cp-header{padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;}
.cp-title{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.cp-close{font-size:16px;cursor:pointer;color:var(--color-text-secondary);background:none;border:none;padding:2px 6px;}
.cp-log{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.cm{max-width:90%;padding:9px 12px;border-radius:var(--border-radius-md);font-size:12px;line-height:1.6;}
.cm.ai{background:var(--color-background-secondary);color:var(--color-text-primary);align-self:flex-start;}
.cm.user{background:#185FA5;color:#fff;align-self:flex-end;}
.cm-who{font-size:10px;font-weight:500;margin-bottom:3px;opacity:.7;}
.cm.ai .cm-who{color:var(--color-text-secondary);}
.cm.user .cm-who{color:rgba(255,255,255,.7);}
.cp-foot{padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:7px;}
.cp-input{flex:1;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);}
.cp-input:focus{outline:none;border-color:#185FA5;}
.cp-send{background:#185FA5;color:#fff;border:none;border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;cursor:pointer;}

.toast{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:9px 20px;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;z-index:999;animation:tfu .25s;pointer-events:none;white-space:nowrap;}
@keyframes tfu{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>

<div class="root" id="root">

  <!-- ── 左：AI結果（主役） ── -->
  <div class="ai-panel" id="aiPanel">

    <!-- ステータスバー -->
    <div class="status-bar" id="statusBar" style="display:none">
      <div class="status-pill sp-warn" id="statusPill">
        <div class="sp-dot"></div>
        <span id="statusLabel">交渉必要</span>
      </div>
      <div class="status-route" id="statusRoute"></div>
      <div class="chat-trigger" onclick="toggleChat()">💬 AI交渉アシスト</div>
    </div>

    <!-- 空状態 -->
    <div class="empty-state" id="emptyState">
      <div class="es-icon">💴</div>
      <div class="es-title">AIが運賃を判断します</div>
      <div class="es-sub">右の3項目を入力して<br>「AIに任せる」を押してください</div>
    </div>

    <!-- ローディング -->
    <div class="loading-state" style="display:none" id="loadingState">
      <div class="ls-price">¥——</div>
      <div class="ls-bar"><div class="ls-fill"></div></div>
      <div class="ls-text">相場データと条件を分析中...</div>
    </div>

    <!-- 結果本体 -->
    <div class="result-body" style="display:none" id="resultBody">

      <!-- 価格（超デカく） -->
      <div class="price-block">
        <div class="pb-label">推奨提示価格</div>
        <div class="pb-price" id="rbPrice">¥38,000</div>
        <div class="pb-sub" id="rbRange">相場レンジ ¥28,000〜¥42,000</div>
        <div class="pb-reason" id="rbReason"></div>
      </div>

      <!-- 提案（1ブロック） -->
      <div class="proposal-block">
        <div class="pb2-label">条件すり合わせ提案</div>
        <div class="proposals" id="proposalList"></div>
      </div>

      <!-- アクション（1ボタン主） -->
      <div class="action-block">
        <button class="btn-primary" id="btnApprove" onclick="approve()">この条件で進める</button>
        <button class="btn-ghost" onclick="rerun()">再判断</button>
      </div>

    </div>
  </div>

  <!-- ── 右：入力（脇役） ── -->
  <div class="input-panel">
    <div class="ip-header">
      <div class="ip-title">案件を入力</div>
      <div class="ip-sub">3項目でAIが即判断</div>
    </div>
    <div class="ip-body">

      <!-- 基本3項目 -->
      <div class="fr">
        <label class="fl">出発地</label>
        <select class="fs" id="u-from">
          <option>東京都</option><option>神奈川県</option><option>埼玉県</option>
          <option>千葉県</option><option>大阪府</option><option>愛知県</option>
        </select>
      </div>
      <div class="fr">
        <label class="fl">配送先</label>
        <select class="fs" id="u-to">
          <option>神奈川県</option><option>東京都</option><option>埼玉県</option>
          <option>千葉県</option><option>大阪府</option><option>愛知県</option>
        </select>
      </div>
      <div class="fr">
        <label class="fl">荷物タイプ</label>
        <select class="fs" id="u-gtype">
          <option>一般貨物</option><option>精密機器</option>
          <option>冷蔵・冷凍</option><option>大型家具</option><option>危険物</option>
        </select>
      </div>

      <!-- 詳細トグル -->
      <button class="detail-toggle" onclick="toggleDetail(this)">
        <span id="detailArrow">＋</span> 詳細を入力
      </button>
      <div class="detail-section" id="detailSection">
        <div class="ds-divider"></div>
        <div class="fr">
          <label class="fl">重量（kg）</label>
          <input class="fi" id="u-weight" type="number" placeholder="AIが推定" />
        </div>
        <div class="fr">
          <label class="fl">車種</label>
          <select class="fs" id="u-vtype">
            <option>AIが選択</option><option>軽バン</option>
            <option>2tトラック</option><option>4tトラック</option><option>10tトラック</option>
          </select>
        </div>
        <div class="fr">
          <label class="fl">希望日時</label>
          <input class="fi" id="u-date" placeholder="例：来週月曜 午前中" />
        </div>
        <div class="fr">
          <label class="fl">荷主の提示価格（円）</label>
          <input class="fi" id="u-offered" type="number" placeholder="任意" />
        </div>
        <div class="fr">
          <label class="fl">緊急度</label>
          <select class="fs" id="u-urgency">
            <option>通常</option><option>急ぎ（翌日以内）</option><option>本日中</option>
          </select>
        </div>
        <div class="fr">
          <label class="fl">特記事項</label>
          <input class="fi" id="u-note" placeholder="時間指定・待機あり等" />
        </div>
      </div>
    </div>

    <div class="ip-foot">
      <button class="run-btn" id="runBtn" onclick="runJudge()">AIに任せる</button>
      <div class="auto-badge"><div class="auto-dot"></div>AIが相場・条件を自動補完</div>
    </div>
  </div>

  <!-- ── サイドチャット（スライド） ── -->
  <div class="chat-panel" id="chatPanel">
    <div class="cp-header">
      <div class="cp-title">💬 AI交渉アシスト</div>
      <button class="cp-close" onclick="toggleChat()">✕</button>
    </div>
    <div class="cp-log" id="cpLog">
      <div class="cm ai">
        <div class="cm-who">🤖 AI</div>
        交渉アシストです。荷主への返答文の作成や、代替案の提案ができます。
      </div>
    </div>
    <div class="cp-foot">
      <input class="cp-input" id="cpInput" placeholder="例：35,000円と言われました。どう返す？" onkeydown="if(event.key==='Enter')sendChat()" />
      <button class="cp-send" onclick="sendChat()">送信</button>
    </div>
  </div>
</div>

<script>
// ---- 相場データ ----
const shobaDB=[
  {from:'東京都',to:'神奈川県',vtype:'軽バン',gtype:'一般貨物',min:15000,avg:18500,max:22000},
  {from:'東京都',to:'神奈川県',vtype:'2tトラック',gtype:'一般貨物',min:28000,avg:35000,max:42000},
  {from:'東京都',to:'神奈川県',vtype:'2tトラック',gtype:'精密機器',min:38000,avg:46000,max:58000},
  {from:'東京都',to:'神奈川県',vtype:'4tトラック',gtype:'一般貨物',min:45000,avg:54000,max:65000},
  {from:'東京都',to:'埼玉県',vtype:'軽バン',gtype:'一般貨物',min:12000,avg:16000,max:20000},
  {from:'東京都',to:'埼玉県',vtype:'2tトラック',gtype:'一般貨物',min:22000,avg:29000,max:38000},
  {from:'東京都',to:'千葉県',vtype:'軽バン',gtype:'一般貨物',min:14000,avg:17500,max:21000},
  {from:'東京都',to:'千葉県',vtype:'2tトラック',gtype:'冷蔵・冷凍',min:42000,avg:52000,max:65000},
  {from:'神奈川県',to:'東京都',vtype:'2tトラック',gtype:'一般貨物',min:26000,avg:33000,max:40000},
  {from:'東京都',to:'大阪府',vtype:'4tトラック',gtype:'一般貨物',min:85000,avg:110000,max:135000},
];

// ---- UIヘルパー ----
function show(id){document.getElementById(id).style.display='flex';}
function hide(id){document.getElementById(id).style.display='none';}
function showBlock(id){document.getElementById(id).style.display='block';}
function hideBlock(id){document.getElementById(id).style.display='none';}

let detailOpen=false;
function toggleDetail(btn){
  detailOpen=!detailOpen;
  const sec=document.getElementById('detailSection');
  sec.classList.toggle('open',detailOpen);
  document.getElementById('detailArrow').textContent=detailOpen?'－':'＋';
}

let chatOpen=false;
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatPanel').classList.toggle('open',chatOpen);
}

// ---- ステータス設定 ----
function setStatus(type,route){
  const bar=document.getElementById('statusBar');
  bar.style.display='flex';
  const pill=document.getElementById('statusPill');
  const label=document.getElementById('statusLabel');
  const cls={ok:'sp-ok',warn:'sp-warn',ng:'sp-ng'};
  const txt={ok:'🟢 成約OK',warn:'🟡 交渉必要',ng:'🔴 NG'};
  pill.className='status-pill '+(cls[type]||'sp-warn');
  label.textContent=txt[type]||'判断中';
  document.getElementById('statusRoute').innerHTML=route||'';
}

// ---- AI判断 ----
let currentResult=null;
async function runJudge(){
  const btn=document.getElementById('runBtn');
  btn.className='run-btn loading';btn.textContent='判断中...';

  hide('emptyState');
  show('loadingState');
  hideBlock('resultBody');
  document.getElementById('statusBar').style.display='none';

  const from=document.getElementById('u-from').value;
  const to=document.getElementById('u-to').value;
  const gtype=document.getElementById('u-gtype').value;
  const weight=document.getElementById('u-weight').value;
  const vtypeRaw=document.getElementById('u-vtype')?.value||'AIが選択';
  const date=document.getElementById('u-date').value;
  const offered=document.getElementById('u-offered').value;
  const urgency=document.getElementById('u-urgency')?.value||'通常';
  const note=document.getElementById('u-note').value;

  // 相場マッチング
  const matched=shobaDB.find(r=>r.from===from&&r.to===to&&(vtypeRaw==='AIが選択'||r.vtype===vtypeRaw))||
    shobaDB.find(r=>r.from===from&&r.to===to)||shobaDB[0];
  const autoVtype=vtypeRaw==='AIが選択'?'2tトラック':vtypeRaw;

  let result=null;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:`運送会社の運賃AIです。以下の条件でJSON形式のみ返答（前後説明・\`\`\`不要）。

条件: ${from}→${to} / ${gtype} / 重量:${weight||'不明（AIが推定）'}kg / 車種:${autoVtype} / 日程:${date||'未定'} / 緊急度:${urgency} / 特記:${note||'なし'}
荷主提示: ${offered?'¥'+Number(offered).toLocaleString():'未提示'}
相場データ: min¥${matched.min.toLocaleString()} avg¥${matched.avg.toLocaleString()} max¥${matched.max.toLocaleString()}

返すJSON:
{"recommend":数値,"min":数値,"max":数値,"reason":"価格根拠80字以内","status":"ok|warn|ng","status_reason":"ステータス理由20字","proposals":[{"type":"タイトル","tag":"推奨|代替|最低","detail":"条件説明50字","price":数値},{"type":"タイトル","tag":"推奨|代替|最低","detail":"条件説明50字","price":数値},{"type":"タイトル","tag":"推奨|代替|最低","detail":"条件説明50字","price":数値}]}`}]})
    });
    const data=await res.json();
    const txt=data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    result=JSON.parse(txt);
  }catch(e){
    const mul=gtype==='精密機器'?1.25:gtype==='冷蔵・冷凍'?1.35:1;
    const urg=urgency==='本日中'?1.4:urgency==='急ぎ（翌日以内）'?1.2:1;
    const rec=Math.round(matched.avg*mul*urg/1000)*1000;
    const offNum=offered?Number(offered):null;
    const st=!offNum?'warn':offNum>=matched.avg*mul?'ok':offNum>=matched.min*mul?'warn':'ng';
    result={
      recommend:rec,min:Math.round(matched.min*mul/1000)*1000,max:Math.round(matched.max*mul*urg/1000)*1000,
      reason:`${from}→${to}の${autoVtype}相場平均¥${matched.avg.toLocaleString()}を基準に${gtype==='精密機器'?'精密機器割増+25%を':''}加算。${urgency!=='通常'?urgency+'対応のため割増あり。':''}`,
      status:st,status_reason:st==='ok'?'成約OK':`荷主提示が相場比${offNum?Math.round((offNum/rec-1)*100)+'%':'不明'}`,
      proposals:[
        {type:'推奨プラン',tag:'推奨',detail:`${autoVtype}・${gtype}・標準条件での提示`,price:rec},
        {type:'時間指定なしプラン',tag:'代替',detail:'到着時間を「午前中」に緩和することで5%値引き',price:Math.round(rec*0.95/1000)*1000},
        {type:'最低受注ライン',tag:'最低',detail:'帰り便活用・積み合わせ可の場合に限り対応可',price:Math.round(matched.min*mul/1000)*1000},
      ]
    };
  }
  currentResult=result;

  hide('loadingState');
  showBlock('resultBody');

  // 価格表示
  document.getElementById('rbPrice').textContent='¥'+result.recommend.toLocaleString();
  document.getElementById('rbRange').textContent=`相場レンジ ¥${result.min.toLocaleString()}〜¥${result.max.toLocaleString()}`;
  document.getElementById('rbReason').textContent=result.reason;

  // ステータス
  const offStr=offered?` 荷主提示 <strong>¥${Number(offered).toLocaleString()}</strong>`:' 荷主提示 <strong>未提示</strong>';
  setStatus(result.status,`<strong>${from}</strong> → <strong>${to}</strong> ／ ${autoVtype} ／ ${gtype}${offStr}`);

  // 提案
  const pl=document.getElementById('proposalList');pl.innerHTML='';
  const tagCls={推奨:'pt-rec',代替:'pt-alt',最低:'pt-min'};
  result.proposals.forEach((p,i)=>{
    const d=document.createElement('div');d.className='prop';d.id='prop-'+i;
    d.innerHTML=`<div class="prop-left"><div class="prop-tag ${tagCls[p.tag]||'pt-alt'}">${p.tag}</div><div class="prop-type">${p.type}</div><div class="prop-detail">${p.detail}</div></div><div class="prop-price">¥${p.price.toLocaleString()}</div>`;
    d.onclick=()=>{document.querySelectorAll('.prop').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');document.getElementById('btnApprove').textContent=`¥${p.price.toLocaleString()} で進める`;};
    pl.appendChild(d);
  });
  // 推奨を最初から選択
  const firstProp=document.getElementById('prop-0');
  if(firstProp){firstProp.classList.add('selected');document.getElementById('btnApprove').textContent=`¥${result.proposals[0].price.toLocaleString()} で進める`;}

  // チャット初期メッセージ更新
  addChatMsg('ai',`推奨価格¥${result.recommend.toLocaleString()}で判断しました。${offered?'荷主提示¥'+Number(offered).toLocaleString()+'との差額¥'+(result.recommend-Number(offered)).toLocaleString()+'について交渉戦略をお伝えできます。':''}何か聞いてください。`);

  btn.className='run-btn';btn.textContent='AIに任せる';
}

function approve(){
  const sel=document.querySelector('.prop.selected');
  if(!sel)return;
  const price=sel.querySelector('.prop-price').textContent;
  toast(`✅ ${price} で交渉を進めます`);
  setStatus('ok','成約に向けて交渉開始');
}

function rerun(){
  hide('resultBody');
  document.getElementById('statusBar').style.display='none';
  show('emptyState');
  document.getElementById('runBtn').click();
}

// ---- チャット ----
async function sendChat(){
  const input=document.getElementById('cpInput');
  const text=input.value.trim();if(!text)return;
  addChatMsg('user',text);input.value='';
  const from=document.getElementById('u-from').value,to=document.getElementById('u-to').value;
  const rec=currentResult?'¥'+currentResult.recommend.toLocaleString():'未判断';
  const offered=document.getElementById('u-offered').value;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:`運送会社の運賃交渉AIアシスト。案件:${from}→${to} 推奨¥${rec} 荷主提示:${offered?'¥'+Number(offered).toLocaleString():'未提示'}。質問:「${text}」。100字以内で実践的アドバイスを日本語で。`}]})});
    const data=await res.json();
    addChatMsg('ai',data.content.map(i=>i.text||'').join('').trim());
  }catch(e){
    addChatMsg('ai','相場データを根拠に「業界標準価格です」と伝え、時間指定なし等の条件変更で値引きを提案してみてください。');
  }
}
function addChatMsg(who,text){
  const log=document.getElementById('cpLog');
  const d=document.createElement('div');d.className='cm '+(who==='ai'?'ai':'user');
  d.innerHTML=`<div class="cm-who">${who==='ai'?'🤖 AI':'👤 担当者'}</div>${text}`;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
}

function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.getElementById('root').appendChild(t);setTimeout(()=>t.remove(),2600);
}
</script>
